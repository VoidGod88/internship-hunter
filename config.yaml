cv_pdf_path: D:\WorkBuddy\internship_hunter\internship-hunter\cv.pdf
search_keywords:
- summer internship 2026 computer science
- software engineer intern summer 2026
- AI internship summer 2026
- data science intern summer 2026
scrapers:
  linkedin: true
  jobsdb: true
  indeed: true
  efinancialcareers: true
  manual_companies: true
  polyu: true
wie_filter:
  enabled: true
  require_hk_location: true
  exclude_non_cs: true
  exclude_final_year_required: true
cv_matching:
  enabled: true
  match_education: true
  match_skills: true
  match_final_year: true
cover_letter:
  enabled: true
  language: en
email_settings:
  subject_template: Application for {job_title} – Summer Internship
  attach_cv: true
  delay_seconds: 5
linkedin_filters:
  experience_level: []           # Multi-select: 1=Entry, 2=Associate, 3=Mid-Senior, 4=Director, 5=Executive, 6=Internship
  job_types: ["F","P","I"]      # Multi-select: F=Full-time, P=Part-time, I=Internship, C=Contract, T=Temporary, V=Volunteer
  work_types: ["1"]              # Multi-select: 1=On-site, 2=Remote, 3=Hybrid
  geo_id: '103291313'           # Single: LinkedIn geo ID (103291313=Hong Kong)
  sort_by: 'R'                  # Single: R=Relevance, DD=Most recent
  posted_within: ''              # Single: past_24h, past_week, past_month, or empty
jobsdb_filters:
  category: information-communication-technology
  work_type: []                  # Multi-select: 242=Full time, 243=Part time, 244=Contract/Temp, 245=Casual/Vacation
  work_arrangement: []           # Multi-select: 1=On-site, 2=Hybrid, 3=Remote
  daterange: '7'
indeed_filters:
  date_range: '7'
  education: bachelor           # Single: bachelor, master, phd, diploma (encrypted URL param, default bachelor)
  job_type: ''
  sort_by: date
  radius: '50'
efc_filters:
  experience_level: []           # Multi-select: NO_EXPERIENCE, ONE_THREE_YEARS, THREE_FIVE_YEARS, FIVE_SEVEN_YEARS, SEVEN_TEN_YEARS, TEN_FIFTEEN_YEARS
  posted_within: ''
  page_size: '15'
