# ──────────────────────────────────────────────────────────
# config.example.yaml — Copy to config.yaml and customize
# Safe to share publicly (no real credentials here)
# ──────────────────────────────────────────────────────────

# Your CV PDF path (relative to project root or absolute)
cv_pdf_path: "CV_YipFungMing.pdf"

# ⚠️  dry_run: true  = preview only, no real emails sent
#     dry_run: false = send real emails
dry_run: true

# Max emails to send per run (safety limit)
max_emails_per_run: 10

# ── Search Keywords ──
# Customize these to match your target roles
search_keywords:
  - "AI intern Hong Kong"
  - "machine learning intern Hong Kong"
  - "LLM intern Hong Kong"
  - "AI developer intern Hong Kong"
  - "data science intern Hong Kong"
  - "software engineer intern AI Hong Kong"
  - "AI agent developer intern"
  - "generative AI intern"
  - "immediate start internship Hong Kong"
  - "summer internship Hong Kong"
  - "IT intern Hong Kong"
  - "computer science intern Hong Kong"

# ── Scraper Controls ──
scrapers:
  polyu_jobboard: true    # PolyU internal job board (requires NetID)
  linkedin: true
  jobsdb: true
  indeed: true
  efinancialcareers: true
  manual_companies: true   # Load from manual_companies.json

# ── WIE Filtering ──
wie_filter:
  enabled: true
  require_hk_location: true
  exclude_non_cs: true
  exclude_final_year_required: true

# ── CV Matching ──
cv_matching:
  enabled: true           # Use CV to filter matching jobs
  match_education: true   # Check education requirement
  match_skills: true       # Check skills match
  match_final_year: true  # Reject if job requires final year only

# ── LLM Cover Letter Settings ──
cover_letter:
  enabled: true           # Use AI to generate cover letters
  language: "en"           # "en" for English, "zh" for Chinese

# ── Email Settings ──
email_settings:
  subject_template: "Summer 2026 Internship Application – {title} | {name} (PolyU CS)"
  attach_cv: true
  delay_seconds: 5         # Random delay between emails (5-10s)
